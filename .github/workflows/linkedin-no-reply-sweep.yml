name: LinkedIn No-Reply Sweep

on:
  schedule:
    # Daily at 06:00 UTC (~07:00 Berlin im Winter, ~08:00 im Sommer)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Run no-reply sweep
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/linkedin-no-reply-sweep")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Sweep failed with status $HTTP_CODE"
            exit 1
          fi
