name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync secrets to server
        run: |
          ssh solarlead@${{ secrets.SERVER_HOST }} "
            cd /opt/solarlead &&
            grep -q '^CRON_SECRET=' .env.local 2>/dev/null \
              && sed -i 's|^CRON_SECRET=.*|CRON_SECRET=${{ secrets.CRON_SECRET }}|' .env.local \
              || echo 'CRON_SECRET=${{ secrets.CRON_SECRET }}' >> .env.local &&
            echo 'Secrets synchronisiert'
          "

      - name: Deploy via SSH
        run: |
          ssh solarlead@${{ secrets.SERVER_HOST }} "
            cd /opt/solarlead &&
            git checkout -- package.json package-lock.json &&
            git pull origin master &&
            npm install &&
            rm -rf .next &&
            npm run build &&
            pm2 restart all --update-env &&
            echo 'Deploy erfolgreich'
          "
