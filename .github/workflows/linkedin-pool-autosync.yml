name: LinkedIn Pool Auto-Sync

on:
  schedule:
    # Alle 4 Stunden (UTC)
    - cron: "15 */4 * * *"
  workflow_dispatch:

jobs:
  autosync:
    runs-on: ubuntu-latest
    steps:
      - name: Run LinkedIn pool auto-sync
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/linkedin-pool-autosync")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Auto-Sync failed with status $HTTP_CODE"
            exit 1
          fi

          # Parse summary
          SKIPPED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped', False))" 2>/dev/null || echo "?")
          CREATED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('created', 0))" 2>/dev/null || echo "?")
          REASON=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('reason', ''))" 2>/dev/null || echo "")

          if [ "$SKIPPED" = "True" ]; then
            echo "Sync übersprungen: $REASON"
          else
            echo "Auto-Sync abgeschlossen: $CREATED neue LinkedIn-Jobs"
          fi
